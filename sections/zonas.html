<section class="zones">
  <div class="container">
    <button class="icon-btn back-btn" aria-label="Regresar">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
        <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2Z"/>
      </svg>
    </button>

    <h2 class="title zones-title" data-i18n="title.zones">Huariques cerca de ti</h2>

    <div class="zones-controls">
      <input id="zonesSearch" type="search" data-i18n-placeholder="zones.searchph" placeholder="Buscar en esta zona (ej. pollo, ceviche, postres)">
      <div class="chips" id="zonesChips">
        <button class="chip active" data-cat="all"      data-i18n="zones.chips.all">Todos</button>
        <button class="chip"         data-cat="pollo"   data-i18n="zones.chips.pollo">Pollo</button>
        <button class="chip"         data-cat="mariscos"data-i18n="zones.chips.mariscos">Mariscos</button>
        <button class="chip"         data-cat="criolla" data-i18n="zones.chips.criolla">Criolla</button>
        <button class="chip"         data-cat="postres" data-i18n="zones.chips.postres">Postres</button>
      </div>
      <div class="zones-meta">
        <span id="zonesCount">0</span> <span data-i18n="zones.results">resultados</span>
      </div>
    </div>

    <div class="zones-layout">
      <aside class="zones-list" aria-label="Resultados">
        <ul id="resultsList"></ul>
      </aside>
      <div class="map-wrap"><div id="mapZonas" aria-label="Mapa de huariques"></div></div>
    </div>
  </div>
</section>
