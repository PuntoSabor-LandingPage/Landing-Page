<section class="profile">
  <div class="container">
    <div class="profile-top">
      <button class="icon-btn back-btn" aria-label="Regresar">
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2Z"/>
        </svg>
      </button>
      <button class="pill-btn" id="btnLogo" type="button" data-i18n="profile.logo">LOGO</button>
    </div>

    <div class="profile-grid">
      <div class="profile-media card">
        <img src="img/LogoDeHuarique.png" alt="logo huarique">
      </div>

      <div class="profile-text card">
        <textarea id="bio" data-i18n-placeholder="profile.bioPh"
                  placeholder="Escribe aquí la descripción de tu negocio..."
                  spellcheck="false" readonly></textarea>
      </div>
    </div>

    <div class="profile-actions">
      <input id="fileBanner" type="file" accept="image/*" hidden>
      <button class="btn" id="btnUpload"   data-i18n="profile.upload">Subir imagen</button>
      <button class="btn" id="btnRemoveImg"data-i18n="profile.remove">Borrar imagen</button>

      <button class="btn" id="btnEdit"     data-i18n="profile.edit">Editar</button>
      <button class="btn" id="btnSave"     data-i18n="profile.save">Guardar</button>
      <button class="btn btn-danger" id="btnDelete" data-i18n="profile.delete">Eliminar</button>
    </div>

    <div class="profile-back">
      <button class="btn btn-large" id="btnGoBack" data-i18n="profile.back">REGRESAR</button>
    </div>

    <button class="fab" id="btnPlus" aria-label="Agregar">
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path fill="currentColor" d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6Z"/>
      </svg>
    </button>
  </div>
</section>
